openapi: 3.1.0
info:
  title: Webhook Example
  version: 1.0.0
webhooks:
  newPet:
    delete:
      tags:
        - Webhooks
      parameters:
        - name: id
          in: query
          description: The pet ID to delete
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Return a 204 status to indicate that the record was successfully
            deleted.
    post:
      requestBody:
        description: Information about a new pet in the system
        content:
          application/json:
            schema:
              '$ref': '#/components/schemas/Pet'
      responses:
        '200':
          description: Return a 200 status to indicate that the data was received
            successfully
      tags:
        - Webhooks
components:
  schemas:
    Pet:
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
